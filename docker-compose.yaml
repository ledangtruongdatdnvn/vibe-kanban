services:
  remote-db:
    image: postgres:16-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: remote
      POSTGRES_USER: remote
      POSTGRES_PASSWORD: ${DB_PASSWORD:-remote}
    volumes:
      - remote-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remote -d remote"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose --skipApiVersionCheck"
    restart: unless-stopped
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc 127.0.0.1 10000 -z"]
      interval: 1s
      retries: 30

  azurite-init:
    image: mcr.microsoft.com/azure-cli:latest
    restart: "no"
    depends_on:
      azurite:
        condition: service_healthy
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=${AZURE_STORAGE_ACCOUNT_NAME:-devstoreaccount1};AccountKey=${AZURE_STORAGE_ACCOUNT_KEY:-Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==};BlobEndpoint=http://azurite:10000/${AZURE_STORAGE_ACCOUNT_NAME:-devstoreaccount1};"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        az storage container create --name "${AZURE_STORAGE_CONTAINER_NAME:-issue-attachments}" 2>/dev/null || true
        az storage cors add --services b --methods GET PUT POST DELETE OPTIONS --origins '*' --allowed-headers '*' --exposed-headers '*' --max-age 3600
        echo "Azurite CORS configured"

  electric:
    image: electricsql/electric:1.3.3
    working_dir: /app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://electric_sync:${ELECTRIC_ROLE_PASSWORD}@remote-db:5432/remote?sslmode=disable
      PG_PROXY_PORT: 65432
      LOGICAL_PUBLISHER_HOST: electric
      AUTH_MODE: insecure
      ELECTRIC_INSECURE: true
      ELECTRIC_MANUAL_TABLE_PUBLISHING: true
      ELECTRIC_USAGE_REPORTING: false
      ELECTRIC_FEATURE_FLAGS: allow_subqueries,tagged_subqueries
    volumes:
      - electric-data:/app/persistent
    depends_on:
      remote-db:
        condition: service_healthy

  remote-server:
    build:
      context: .
      dockerfile: crates/remote/Dockerfile
      args:
        VITE_RELAY_API_BASE_URL: ${VITE_RELAY_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      remote-db:
        condition: service_healthy
      azurite-init:
        condition: service_completed_successfully
    environment:
      RUST_LOG: info,remote=info
      SERVER_DATABASE_URL: postgres://remote:${DB_PASSWORD:-remote}@remote-db:5432/remote
      SERVER_LISTEN_ADDR: 0.0.0.0:8081
      ELECTRIC_URL: http://electric:3000
      SERVER_PUBLIC_BASE_URL: https://${DOMAIN}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}
      ELECTRIC_ROLE_PASSWORD: ${ELECTRIC_ROLE_PASSWORD}
      LOOPS_EMAIL_API_KEY: ${LOOPS_EMAIL_API_KEY:-}
      # Attachments stay disabled unless you explicitly set these env vars.
      # AZURE_STORAGE_PUBLIC_ENDPOINT_URL must be reachable from the user's browser.
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-}
      AZURE_STORAGE_ENDPOINT_URL: ${AZURE_STORAGE_ENDPOINT_URL:-}
      AZURE_STORAGE_PUBLIC_ENDPOINT_URL: ${AZURE_STORAGE_PUBLIC_ENDPOINT_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  relay-server:
    build:
      context: .
      dockerfile: crates/relay-tunnel/Dockerfile
    restart: unless-stopped
    depends_on:
      remote-db:
        condition: service_healthy
    environment:
      RUST_LOG: info
      SERVER_DATABASE_URL: postgres://remote:${DB_PASSWORD:-remote}@remote-db:5432/remote
      RELAY_LISTEN_ADDR: 0.0.0.0:8082
      VIBEKANBAN_REMOTE_JWT_SECRET: ${VIBEKANBAN_REMOTE_JWT_SECRET}

  # ── Host Admin service ────────────────────────────────────────────────────
  # Temporary admin console. Start it only when needed, then turn it off.
  #
  # Exposes a small browser UI for:
  #   - saving Claude / Codex credentials
  #   - deleting workspaces through the normal host API
  #   - deleting safe local branches
  #   - cleaning orphan worktrees
  #   - wiping persisted host data / saved credentials
  #
  # Protect this service with ADMIN_SECRET and keep it disabled unless
  # you actively need it.
  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    restart: unless-stopped
    environment:
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      ADMIN_BASE_URL: http://host:3004
      CLAUDE_CREDS_DIR: /creds/claude
      CODEX_CREDS_DIR: /creds/codex
      HOST_DATA_DIR: /data/host-data
    volumes:
      - claude-credentials:/creds/claude
      - codex-credentials:/creds/codex
      - host-data:/data/host-data
    ports:
      - "3005:3005"

  # ── HOST service ──────────────────────────────────────────────────────────
  # Runs the vibe-kanban local server on this machine so that it acts as a
  # coding HOST reachable from any browser via the relay tunnel.
  #
  # How it works:
  #   1. The server starts and serves the embedded web UI on BACKEND_PORT.
  #   2. After you (or any user) log in through the web UI, the server
  #      automatically opens a WebSocket tunnel to relay-server and registers
  #      this machine as a HOST.
  #   3. Remote browsers routed through remote-server → relay-server can then
  #      interact with this HOST without it needing a public port.
  #
  # Required env vars (set in .env or export before `docker compose up`):
  #   DOMAIN                      public hostname of this stack (already used above)
  #   VIBEKANBAN_REMOTE_JWT_SECRET  already required by remote-server
  #
  # Optional — build-time URL baking (set before first `docker compose build`):
  #   VK_SHARED_API_BASE          defaults to https://${DOMAIN}
  #   VK_SHARED_RELAY_API_BASE    defaults to https://${DOMAIN}/relay
  host:
    build:
      context: .
      dockerfile: crates/server/Dockerfile
      args:
        # Bake the public URLs into the binary so the frontend and relay
        # client know where to connect without extra runtime config.
        VK_SHARED_API_BASE: ${VK_SHARED_API_BASE:-https://${DOMAIN}}
        VK_SHARED_RELAY_API_BASE: ${VK_SHARED_RELAY_API_BASE:-https://${DOMAIN}/relay}
    restart: unless-stopped
    depends_on:
      remote-server:
        condition: service_healthy
      relay-server:
        condition: service_started
    environment:
      RUST_LOG: info
      BACKEND_PORT: 3004
      # Runtime overrides (take precedence over compile-time values).
      # Inside the Docker network the server can reach relay-server directly.
      VK_SHARED_API_BASE: ${VK_SHARED_API_BASE:-https://${DOMAIN}}
      VK_SHARED_RELAY_API_BASE: ${VK_SHARED_RELAY_API_BASE:-http://relay-server:8082}
      # ── AI executor credentials ─────────────────────────────────────────
      # Option A – API keys (pay-per-use).  Set in your .env file.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Automatically fix ownership on mounted repo/data directories before
      # the server drops privileges to the `node` user.
      HOST_AUTO_FIX_OWNERSHIP: ${HOST_AUTO_FIX_OWNERSHIP:-1}
      # Option B – subscription login (see "next steps" below).
      # Leave these blank; credentials are persisted in the volumes.
    volumes:
      # Persistent data: SQLite DB, config, relay credentials, process logs
      # The app stores these under the OS data dir on Linux:
      #   /home/node/.local/share/vibe-kanban
      - host-data:/home/node/.local/share/vibe-kanban
      # Expose the default Linux worktree temp dir on the host so SSH-based
      # IDE deeplinks can open workspaces created under /var/tmp/vibe-kanban.
      # Override with HOST_WORKTREES_DIR in .env if you need a different host path.
      - ${HOST_WORKTREES_DIR:-/var/tmp/vibe-kanban}:/var/tmp/vibe-kanban
      # Mount a dedicated host directory where repos will be cloned / worked on.
      # Default: /srv/vibe-kanban/repos on the server -> /home/node/repos in container.
      # Override with HOST_REPOS_DIR in .env if you need a different host path.
      - ${HOST_REPOS_DIR:-/srv/vibe-kanban/repos}:/home/node/repos
      # ── AI subscription credentials (Option B) ──────────────────────────
      # These volumes persist the login state created by `claude login` /
      # `codex login` so you only need to authenticate once.
      - claude-credentials:/home/node/.claude
      - codex-credentials:/home/node/.codex
      # Allow the server to spawn Docker-based executors (optional — remove
      # this line if you do not want the HOST to control the Docker daemon).
      - /var/run/docker.sock:/var/run/docker.sock
    # Expose the backend port for direct local access / debugging.
    # In production the relay tunnel handles all external traffic, so this
    # port does NOT need to be forwarded through a reverse proxy.
    ports:
      - "127.0.0.1:3004:3004"

volumes:
  remote-db-data:
  azurite-data:
  electric-data:
  host-data:
  claude-credentials:
  codex-credentials:
